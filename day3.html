<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's 東京獨旅 - Day 3</title>
    <style>
        :root {
            --morandi-pink: #D8A7B1;
            --morandi-bg: #F4EEED;
            --morandi-blue: #B5C0D0;
            --morandi-green: #8E9775;
            --text-dark: #333333;
            --white: #ffffff;
            --font-size-base: 22px; 
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: var(--morandi-bg); color: var(--text-dark);
            margin: 0; padding: 15px; font-size: var(--font-size-base); line-height: 1.6;
        }

        header {
            text-align: center; padding: 20px 0; background: var(--white);
            border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h1 { color: var(--morandi-pink); margin: 0; font-size: 1.6rem; }

        .tabs {
            display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px;
            padding-bottom: 5px; scrollbar-width: none; 
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background-color: var(--white); border: 3px solid var(--morandi-pink);
            color: var(--morandi-pink); padding: 10px 18px; border-radius: 50px;
            font-size: 20px; font-weight: bold; cursor: pointer; white-space: nowrap;
            text-decoration: none; display: inline-block;
        }
        .tab-btn.active { background-color: var(--morandi-pink); color: var(--white); }

        .section-card {
            background: var(--white); padding: 20px; border-radius: 20px;
            margin-bottom: 20px; border-top: 8px solid var(--morandi-pink);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); animation: fadeIn 0.4s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { color: var(--morandi-pink); border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; }
        h3 { color: var(--morandi-green); font-size: 1.2rem; margin-top: 15px; }

        .nav-btn {
            display: block; background-color: var(--morandi-green); color: white; text-decoration: none;
            padding: 18px; border-radius: 15px; margin: 12px 0; font-weight: bold; text-align: center;
            box-shadow: 0 4px 0 #6D7456;
        }
        .nav-btn:active { transform: translateY(4px); box-shadow: none; }

        /* 景點提示樣式 */
        .info-box {
            background: #fdfafb; border-left: 5px solid var(--morandi-pink);
            padding: 15px; font-size: 18px; margin: 15px 0;
        }

        .note-area { width: 100%; min-height: 150px; border: 2px dashed var(--morandi-blue); background-color: #fafafa; border-radius: 15px; padding: 15px; font-size: 20px; box-sizing: border-box; resize: vertical; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🌸 Julie's 東京獨旅</h1>
</header>

<div class="tabs">
    <a href="index.html" class="tab-btn">4/19</a>
    <a href="day2.html" class="tab-btn">4/20</a>
    <a href="day3.html" class="tab-btn active">4/21</a>
    <a href="day4.html" class="tab-btn">4/22</a>
    <a href="day5.html" class="tab-btn">4/23</a>
    <a href="metro.html" class="tab-btn">🗺️ 交通</a>
</div>

<div class="section-card">
    <h2>📅 4/21 輕井澤深度漫遊</h2>
    
    <h3>🚍 重點交通提醒</h3>
    <div class="info-box">
        <strong>草輕交通巴士：</strong>前往白絲瀑布首選，在「輕井澤站北口」搭乘。<br>
        <strong>西武觀光巴士：</strong>前往星野區（榆樹街小鎮、石之教堂）首選。
    </div>

    <h3>📍 景點導航</h3>
    <p style="font-size: 16px; color: #666;">點擊按鈕直接開啟 Google 導航：</p>
    
    <a href="https://www.google.com/maps/search/?api=1&query=白糸の滝" class="nav-btn" target="_blank">🌲 導航至 白絲瀑布 (Shiraito Falls)</a>
    <a href="https://www.google.com/maps/search/?api=1&query=ハルニレテラス" class="nav-btn" target="_blank">☕ 導航至 榆樹街小鎮 (Harunire Terrace)</a>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <a href="https://www.google.com/maps/dir/?api=1&destination=GLAMDAY+STYLE+Karuizawa&travelmode=transit" class="nav-btn" style="background-color: var(--morandi-pink); box-shadow: 0 4px 0 #B0858E;" target="_blank">🏨 導航回飯店 (Glamday Style)</a>
</div>

<div class="section-card">
    <p>✍️ <strong>Day 3 隨手筆記：</strong></p>
    <textarea class="note-area" placeholder="記錄瀑布的美景或巴士時刻..."></textarea>
</div>

<script>
    // 自動儲存筆記
    const textarea = document.querySelector('.note-area');
    const saved = localStorage.getItem('day3-note');
    if (saved) textarea.value = saved;
    textarea.addEventListener('input', () => localStorage.setItem('day3-note', textarea.value));
</script>

</body>
</html>
